<body>

<div class="statusbar" id="statusbar">
  <span class="statusbar-clock" id="clock">00.00.00</span>
  <span class="statusbar-divider"></span>
  <span class="statusbar-battery">
    <span class="battery-shell"><span class="battery-fill" id="batteryFill"></span></span>
    <span id="batteryLabel">100%</span>
  </span>
</div>

<main class="contact-main">

  <a class="back-link" href="index.html">
    <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.8"/></svg>
    Kembali
  </a>

  <section class="contact-hero">
    <h1>Hubungi Admin</h1>
    <p class="tagline">Tulis pesan kamu, langsung masuk ke email kami</p>
  </section>

  <section class="contact-card">
    <form id="contactForm">
      <label for="nameInput">Nama</label>
      <input type="text" id="nameInput" name="name" placeholder="Nama kamu" required>

      <label for="emailInput">Email kamu</label>
      <input type="email" id="emailInput" name="email" placeholder="buat kami balas ke sini" required>

      <label for="messageInput">Pesan</label>
      <textarea id="messageInput" name="message" rows="5" placeholder="Ceritain kendala atau pertanyaan kamu di sini" required></textarea>

      <button type="submit" id="sendButton">Kirim Pesan</button>
      <p class="form-feedback" id="formFeedback"></p>
    </form>
  </section>

</main>
